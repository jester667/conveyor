name: Build

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - 'develop'
      - 'feature/create_service'

jobs:
  build:
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v1
      - name: set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: 1.11
      - name: Gradle Verify
        run: gradle build -b=build.gradle
      - name: Test Coverage
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
